
<!DOCTYPE html>
<html>
<head>
  <title>Class Kingdom</title>
</head>
<body>

<h1>Class Kingdom</h1>

<input id="name" placeholder="Your name">
<button onclick="login()">Start</button>

<p id="player"></p>
<p id="gold">Gold: 0</p>

<button onclick="addGold()">+10 Gold</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://zfseazpheehiawebxrgx.supabase.co";
const supabaseKey = "sb_publishable_2NpNBMV2yoVX5kNKLZyzPA_WCCEGt2Y";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let playerId = null;

async function login() {
  const name = document.getElementById("name").value;

  let { data } = await supabase
    .from("players")
    .select("*")
    .eq("name", name);

  if (data.length > 0) {
    playerId = data[0].id;
    updateUI(data[0]);
  } else {
    let { data: newPlayer } = await supabase
      .from("players")
      .insert([{ name: name }])
      .select();

    playerId = newPlayer[0].id;
    updateUI(newPlayer[0]);
  }
}

function updateUI(player) {
  document.getElementById("player").innerText = "Player: " + player.name;
  document.getElementById("gold").innerText = "Gold: " + player.gold;
}

async function addGold() {
  if (!playerId) return;

  let { data } = await supabase
    .from("players")
    .select("*")
    .eq("id", playerId)
    .single();

  let newGold = data.gold + 10;

  await supabase
    .from("players")
    .update({ gold: newGold })
    .eq("id", playerId);

  document.getElementById("gold").innerText = "Gold: " + newGold;
}
</script>

</body>
</html>
