<!DOCTYPE html>
<html>
<head>
  <title>Class Kingdom</title>
</head>
  <img id="avatar" width="120" style="image-rendering: pixelated;">
<body>

<h1>Class Kingdom</h1>

<input id="nickname" placeholder="Nickname">
<input id="password" placeholder="Password (5 digits)" type="password">

<button onclick="login()">Login</button>

<p id="player"></p>
<p id="gold">Gold: 0</p>

<button onclick="addGold()">+10 Gold</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://zfseazpheehiawebxrgx.supabase.co";
const supabaseKey = "sb_publishable_2NpNBMV2yoVX5kNKLZyzPA_WCCEGt2Y";

const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseKey);

let playerId = null;

async function login() {
  const nickname = document.getElementById("nickname").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();

  if (!nickname || !password) {
    alert("Enter nickname and password");
    return;
  }

  let { data, error } = await supabaseClient
    .from("players")
    .select("*")
    .eq("nickname", nickname)
    .eq("password", password);

  if (error) {
    console.log(error);
    alert("Error");
    return;
  }

  if (data.length === 0) {
    alert("Wrong nickname or password");
    return;
  }

  playerId = data[0].id;
  updateUI(data[0]);
}

function updateUI(player) {
  document.getElementById("player").innerText = "Player: " + player.nickname;
  document.getElementById("gold").innerText = "Gold: " + player.gold;
}

async function addGold() {
  if (!playerId) {
    alert("Login first");
    return;
  }

  let { data, error } = await supabaseClient
    .from("players")
    .select("*")
    .eq("id", playerId)
    .single();

  if (error) {
    console.log(error);
    return;
  }

  let newGold = data.gold + 10;

  await supabaseClient
    .from("players")
    .update({ gold: newGold })
    .eq("id", playerId);

  document.getElementById("gold").innerText = "Gold: " + newGold;
}
</script>
